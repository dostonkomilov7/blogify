<!DOCTYPE html>
<html>
<head>
    <title>Blogify</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body style="background-color: white;">
    <header>
        <nav>
            <h2>Blogify</h2>
            <div class="search">
                <i class="fa fa-search"></i>
                <input class="search-input" type="text" placeholder="Search posts, people, or topics...">
            </div>
            <ul>
                <button class="bell"><i class="fa-regular fa-bell"></i></button>
                <img src="../assets/ .jpg" alt="">
            </ul>
        </nav>
    </header>
    <div class="main">
        <section class="left-section">
            <button class="home-btn base"><i class="fa-regular fa-house"></i> Home</button>
            <button class="explore-btn base"><i class="fa-regular fa-compass"></i> Explore</button>
            <button class="bookmarks-btn base"><i class="fa-regular fa-bookmark"></i> Bookmarks</button>
            <button class="profile-btn base"><i class="fa-regular fa-user"></i> Profile</button>
            <a href="./create-post-page.html"><button class="create-post"><i class="fa-regular fa-square-plus"></i> Create Post</button></a>
            <br>
            <br>
            <br>
            <br>
            <br>
            <hr>
            <button class="settings base"><i class="fa-regular fa-gear"></i> Settings</button>
            <button class="out-btn"><i class="fa-regular fa-arrow-right-from-bracket"></i>Log out</button>
        </section>
        <section class="right-section">
            <h2>Welcome Back, Doston</h2>
            <div class="post">
                <div class="head-unit">
                    <div class="profile">
                        <img src="../assets/ .jpg" alt="">
                        <div class="username">
                            <h5>Doston Komilov</h5>
                            <p>@doston7 - 2h ago</p>
                        </div>
                    </div>
                    <div>
                        <button class="follow-btn">Follow</button>
                        <button class="other-btn">...</button>
                    </div>
                </div>
                <div class="content-unit">
                    <a href="./post-details-page.html">
                        <img src="../assets/Screenshot 2026-04-12 at 00.04.04.png" alt="">
                    </a>
                    <h2>The Art of Minimalist Living in a Digital Chaos</h2>
                    <p>How I reclaimed 4 hours of my day by ruthlessly auditing my digital subscriptions and physical environment. Discover the simple steps to clarity...</p>
                </div>
                <div class="footer-unit">
                    <div>
                        <i class="fa-regular fa-heart"></i>
                        <p>1.2k</p>
                        <i class="fa-regular fa-comment"></i>
                        <p>84</p>
                        <i class="fa-solid fa-share-nodes"></i>
                    </div>
                    <div>
                        <p>6 MIN READ</p>
                        <i class="fa-regular fa-bookmark"></i>
                        <i class="fa-brands fa-google"></i>
                    </div>
                </div>
            </div>
        </section>
    </div>
    
    <script src="../JS/style.js" type="module"></script>
</body>
</html>
