<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Document</title>
</head>

<body>
    <header>
        <nav>
            <div class="left2">
                <div>
                    <button class="back-btn"><i class="fa-solid fa-arrow-left"></i></button>
                    <hr>
                </div>
                <div>
                    <p>Drafting in Personal Blog</p>
                    <h5>Untitled Post</h5>
                </div>
            </div>
            <ul>
                <button class="preview-btn"><i class="fa-regular fa-eye"></i>Live Preview</button>
                <button class="publish-btn">Publish Post</button>
                <hr>
                <img src="../assets/ .jpg" alt="">
            </ul>
        </nav>
    </header>
    <div class="main-section">
        <img src="../assets/Screenshot 2026-04-12 at 00.04.04.png" alt="">
        <textarea class="title-input" id="titleInput" placeholder="Enter title..." rows="1"
            oninput="autoResize(this); updateCount();"></textarea>
        <textarea class="subtitle-input" id="subtitleInput" placeholder="Short description..." rows="1"
            oninput="autoResize(this);"></textarea>

        <div class="divider"></div>

        <div class="tag-row" id="tagRow">
            <div class="tag">#Writing <button class="tag-x" onclick="removeTag(this)" title="O'chirish">✕</button></div>
            <div class="tag">#Journal <button class="tag-x" onclick="removeTag(this)" title="O'chirish">✕</button></div>
            <div class="add-tag-wrap">
                <button class="add-tag-btn" onclick="showTagInput()" id="addTagBtn">+ Add tag</button>
                <input class="tag-input-field" id="tagInput" placeholder="teg nomi" onkeydown="handleTagKey(event)"
                    onblur="hideTagInput()" />
            </div>
        </div>

        <div class="toolbar-wrap">
            <div class="toolbar" id="toolbar">
                <button class="tb-btn" data-tip="Sarlavha 1" onclick="fmt('h1')">
                    <span class="tb-h">H<span class="tb-sub">1</span></span>
                </button>
                <button class="tb-btn" data-tip="Sarlavha 2" onclick="fmt('h2')">
                    <span class="tb-h">H<span class="tb-sub">2</span></span>
                </button>
                <button class="tb-btn" data-tip="Oddiy matn" onclick="fmt('p')">
                    <svg viewBox="0 0 24 24">
                        <path d="M4 7V4h16v3M9 20V4M15 20v-8M4 20h10" />
                    </svg>
                </button>
                <div class="tb-sep"></div>
                <button class="tb-btn" id="btn-bold" data-tip="Qalin (Ctrl+B)" onclick="execCmd('bold')">
                    <svg viewBox="0 0 24 24">
                        <path d="M6 4h8a4 4 0 010 8H6zM6 12h9a4 4 0 010 8H6z" />
                    </svg>
                </button>
                <button class="tb-btn" id="btn-italic" data-tip="Kursiv (Ctrl+I)" onclick="execCmd('italic')">
                    <svg viewBox="0 0 24 24">
                        <line x1="19" y1="4" x2="10" y2="4" />
                        <line x1="14" y1="20" x2="5" y2="20" />
                        <line x1="15" y1="4" x2="9" y2="20" />
                    </svg>
                </button>
                <button class="tb-btn" id="btn-underline" data-tip="Tagiga chiziq (Ctrl+U)"
                    onclick="execCmd('underline')">
                    <svg viewBox="0 0 24 24">
                        <path d="M6 3v7a6 6 0 006 6 6 6 0 006-6V3" />
                        <line x1="4" y1="21" x2="20" y2="21" />
                    </svg>
                </button>
                <button class="tb-btn" id="btn-strikeThrough" data-tip="O'tkazib chizish"
                    onclick="execCmd('strikeThrough')">
                    <svg viewBox="0 0 24 24">
                        <path
                            d="M17.3 12H6.7M12 6.7c-1.9 0-3.4.9-3.4 2.5 0 .6.2 1.1.6 1.5M12 17.3c2.1 0 3.7-1 3.7-2.7 0-.7-.3-1.3-.8-1.7" />
                    </svg>
                </button>
                <div class="tb-sep"></div>
                <button class="tb-btn" data-tip="Ro'yxat" onclick="fmt('ul')">
                    <svg viewBox="0 0 24 24">
                        <line x1="9" y1="6" x2="20" y2="6" />
                        <line x1="9" y1="12" x2="20" y2="12" />
                        <line x1="9" y1="18" x2="20" y2="18" />
                        <circle cx="4" cy="6" r="1" fill="currentColor" />
                        <circle cx="4" cy="12" r="1" fill="currentColor" />
                        <circle cx="4" cy="18" r="1" fill="currentColor" />
                    </svg>
                </button>
                <button class="tb-btn" data-tip="Raqamli ro'yxat" onclick="fmt('ol')">
                    <svg viewBox="0 0 24 24">
                        <line x1="10" y1="6" x2="21" y2="6" />
                        <line x1="10" y1="12" x2="21" y2="12" />
                        <line x1="10" y1="18" x2="21" y2="18" />
                        <path d="M4 6h1v4M4 10h2M6 18H4l2-2.7A1.5 1.5 0 004.5 13" />
                    </svg>
                </button>
                <button class="tb-btn" data-tip="Iqtibos" onclick="fmt('blockquote')">
                    <svg viewBox="0 0 24 24">
                        <path
                            d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V20c0 1 0 1 1 1zm12 0c3 0 7-1 7-8V5c0-1.25-.757-2.017-2-2h-4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2h.75c0 2.25.25 4-2.75 4v3c0 1 0 1 1 1z" />
                    </svg>
                </button>
                <button class="tb-btn" data-tip="Link qo'shish" onclick="openLinkModal()">
                    <svg viewBox="0 0 24 24">
                        <path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71" />
                        <path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71" />
                    </svg>
                </button>
            </div>
        </div>

        <div class="editor" id="editor" contenteditable="true" data-placeholder="Enter content..."
            oninput="updateCount(); autoSave();" onkeydown="handleEditorKey(event)" onmouseup="updateToolbarState()"
            onkeyup="updateToolbarState()"></div>

        <div class="footer">
            <div class="wc">Word count: <span id="wordCount">0</span> · Characters: <span id="charCount">0</span></div>
            <div class="save-status">
                <div class="save-dot" id="saveDot"></div><span id="saveStatus">Saved</span>
            </div>
        </div>
    </div>

    <div class="link-modal" id="linkModal">
        <div class="link-box">
            <h3>🔗 Link qo'shish</h3>
            <input type="url" id="linkUrl" placeholder="https://example.com"
                onkeydown="if(event.key==='Enter') confirmLink()" />
            <div class="link-box-btns">
                <button class="lb-cancel" onclick="closeLinkModal()">Cancel</button>
                <button class="lb-confirm" onclick="confirmLink()">Add</button>
            </div>
        </div>
    </div>
    </div>
    <script>
        // Current date
        const d = new Date();
        document.getElementById('currentDate').textContent =
            d.toLocaleDateString('uz-UZ', { year: 'numeric', month: 'long', day: 'numeric' });

        // Auto-resize textarea
        function autoResize(el) {
            el.style.height = 'auto';
            el.style.height = el.scrollHeight + 'px';
        }

        // ── FORMAT COMMANDS ──
        function fmt(tag) {
            const editor = document.getElementById('editor');
            editor.focus();
            if (tag === 'ul') {
                document.execCommand('insertUnorderedList');
            } else if (tag === 'ol') {
                document.execCommand('insertOrderedList');
            } else if (tag === 'blockquote') {
                document.execCommand('formatBlock', false, 'blockquote');
            } else {
                document.execCommand('formatBlock', false, tag);
            }
            updateToolbarState();
        }

        function execCmd(cmd) {
            document.getElementById('editor').focus();
            document.execCommand(cmd);
            updateToolbarState();
        }

        // Update active state of toolbar buttons
        function updateToolbarState() {
            ['bold', 'italic', 'underline', 'strikeThrough'].forEach(cmd => {
                const btn = document.getElementById('btn-' + cmd);
                if (btn) btn.classList.toggle('active', document.queryCommandState(cmd));
            });
        }

        // Keyboard shortcuts
        function handleEditorKey(e) {
            if (e.ctrlKey || e.metaKey) {
                if (e.key === 'b') { e.preventDefault(); execCmd('bold'); }
                if (e.key === 'i') { e.preventDefault(); execCmd('italic'); }
                if (e.key === 'u') { e.preventDefault(); execCmd('underline'); }
            }
        }

        // ── WORD / CHAR COUNT ──
        function updateCount() {
            const text = document.getElementById('editor').innerText || '';
            const title = document.getElementById('titleInput').value || '';
            const words = (text + ' ' + title).trim().split(/\s+/).filter(w => w).length;
            const chars = text.length;
            document.getElementById('wordCount').textContent = words;
            document.getElementById('charCount').textContent = chars;
        }

        // ── AUTO SAVE ──
        let saveTimer;
        function autoSave() {
            clearTimeout(saveTimer);
            document.getElementById('saveStatus').textContent = 'Saqlanmoqda...';
            document.getElementById('saveDot').style.background = '#f59e0b';
            saveTimer = setTimeout(() => {
                // Save to localStorage
                localStorage.setItem('editor_content', document.getElementById('editor').innerHTML);
                localStorage.setItem('editor_title', document.getElementById('titleInput').value);
                document.getElementById('saveStatus').textContent = 'Saqlandi';
                document.getElementById('saveDot').style.background = '#10b981';
            }, 1200);
        }

        // Restore saved content
        window.addEventListener('load', () => {
            const saved = localStorage.getItem('editor_content');
            const savedTitle = localStorage.getItem('editor_title');
            if (saved) document.getElementById('editor').innerHTML = saved;
            if (savedTitle) {
                document.getElementById('titleInput').value = savedTitle;
                autoResize(document.getElementById('titleInput'));
            }
            updateCount();
        });

        // ── TAGS ──
        function removeTag(btn) {
            btn.closest('.tag').remove();
        }

        function showTagInput() {
            const inp = document.getElementById('tagInput');
            const addBtn = document.getElementById('addTagBtn');
            addBtn.style.display = 'none';
            inp.style.display = 'inline-block';
            setTimeout(() => inp.focus(), 10);
        }

        function hideTagInput() {
            setTimeout(() => {
                const inp = document.getElementById('tagInput');
                inp.style.display = 'none';
                inp.value = '';
                document.getElementById('addTagBtn').style.display = '';
            }, 150);
        }

        function handleTagKey(e) {
            const inp = document.getElementById('tagInput');
            if (e.key === 'Enter' && inp.value.trim()) {
                const val = inp.value.trim().replace(/^#+/, '');
                const tag = document.createElement('div');
                tag.className = 'tag';
                tag.innerHTML = '#' + val + ' <button class="tag-x" onclick="removeTag(this)">✕</button>';
                document.getElementById('tagRow').insertBefore(tag, document.querySelector('.add-tag-wrap'));
                inp.value = '';
                inp.style.display = 'none';
                document.getElementById('addTagBtn').style.display = '';
            }
            if (e.key === 'Escape') hideTagInput();
        }

        // ── LINK MODAL ──
        let savedRange = null;

        function openLinkModal() {
            // Save current selection
            const sel = window.getSelection();
            if (sel.rangeCount) savedRange = sel.getRangeAt(0).cloneRange();
            document.getElementById('linkModal').classList.add('open');
            setTimeout(() => document.getElementById('linkUrl').focus(), 50);
        }

        function closeLinkModal() {
            document.getElementById('linkModal').classList.remove('open');
            document.getElementById('linkUrl').value = '';
        }

        function confirmLink() {
            const url = document.getElementById('linkUrl').value.trim();
            if (!url) return;
            const editor = document.getElementById('editor');
            editor.focus();
            if (savedRange) {
                const sel = window.getSelection();
                sel.removeAllRanges();
                sel.addRange(savedRange);
            }
            document.execCommand('createLink', false, url);
            // Open links in new tab
            editor.querySelectorAll('a').forEach(a => a.target = '_blank');
            closeLinkModal();
        }

        document.getElementById('linkModal').addEventListener('click', function (e) {
            if (e.target === this) closeLinkModal();
        });

        // ── AI ASSIST ──
        function aiAssist() {
            const title = document.getElementById('titleInput').value;
            const content = document.getElementById('editor').innerText;
            let prompt = 'Blog posti uchun matn yozishda yordam ber';
            if (title) prompt = '"' + title + '" mavzusidagi blog postni yaxshilashga yordam ber';
            if (content.trim()) prompt += '. Mavjud matn: "' + content.slice(0, 200) + '"';
            alert('AI Assist: ' + prompt + '\n\n(Bu yerda ChatGPT/Claude API ulanadi)');
        }

        // ── PUBLISH ──
        function publish() {
            const title = document.getElementById('titleInput').value;
            if (!title.trim()) { alert('Iltimos, sarlavha yozing!'); return; }
            const content = document.getElementById('editor').innerText;
            if (!content.trim()) { alert('Iltimos, matn yozing!'); return; }
            alert('✅ Post nashr etildi!\n\nSarlavha: ' + title);
        }
    </script>
    <script src="../JS/style.js" type="module"></script>
</body>

</html>
