<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Document</title>
</head>

<body>
    <header>
        <nav>
            <div class="left2">
                <div>
                    <button class="back-btn"><i class="fa-solid fa-arrow-left"></i></button>
                    <hr>
                </div>
                <div>
                    <p>Drafting in Personal Blog</p>
                    <h5>Untitled Post</h5>
                </div>
            </div>
            <ul>
                <button class="preview-btn"><i class="fa-regular fa-eye"></i>Live Preview</button>
                <button class="publish-btn" id="publishBtn">Publish Post</button>
                <hr>
                <img src="../assets/ .jpg" alt="">
            </ul>
        </nav>
    </header>
    <div class="main-section">
        <input type="file" id="postImage">
        <div class="page">

            <!-- Title -->
            <textarea class="title-input" id="titleInput" placeholder="Sarlavha yozing..." rows="1"></textarea>
            <div class="divider"></div>

            <!-- Tags -->
            <div class="tag-row" id="tagRow">
                <div class="tag">#Writing <button class="tag-x">✕</button></div>
                <div class="tag">#Journal <button class="tag-x">✕</button></div>
                <div class="add-tag-wrap">
                    <button class="add-tag-btn" id="addTagBtn">+ Teg qo'shish</button>
                    <input class="tag-input-field" id="tagInput" placeholder="teg nomi" />
                </div>
            </div>

            <!-- Toolbar -->
            <div class="toolbar-wrap">
                <div class="toolbar" id="toolbar">

                    <button class="tb-btn" data-tip="Sarlavha 1" data-cmd="h1">
                        <span class="tb-h">H<span class="tb-sub">1</span></span>
                    </button>
                    <button class="tb-btn" data-tip="Sarlavha 2" data-cmd="h2">
                        <span class="tb-h">H<span class="tb-sub">2</span></span>
                    </button>
                    <button class="tb-btn" data-tip="Oddiy matn" data-cmd="p">
                        <svg viewBox="0 0 24 24">
                            <path d="M4 7V4h16v3M9 20V4M15 20v-8M4 20h10" />
                        </svg>
                    </button>

                    <div class="tb-sep"></div>

                    <button class="tb-btn" id="btn-bold" data-tip="Qalin (Ctrl+B)" data-cmd="bold">
                        <svg viewBox="0 0 24 24">
                            <path d="M6 4h8a4 4 0 010 8H6zM6 12h9a4 4 0 010 8H6z" />
                        </svg>
                    </button>
                    <button class="tb-btn" id="btn-italic" data-tip="Kursiv (Ctrl+I)" data-cmd="italic">
                        <svg viewBox="0 0 24 24">
                            <line x1="19" y1="4" x2="10" y2="4" />
                            <line x1="14" y1="20" x2="5" y2="20" />
                            <line x1="15" y1="4" x2="9" y2="20" />
                        </svg>
                    </button>
                    <button class="tb-btn" id="btn-underline" data-tip="Tagiga chiziq (Ctrl+U)" data-cmd="underline">
                        <svg viewBox="0 0 24 24">
                            <path d="M6 3v7a6 6 0 006 6 6 6 0 006-6V3" />
                            <line x1="4" y1="21" x2="20" y2="21" />
                        </svg>
                    </button>
                    <button class="tb-btn" id="btn-strikeThrough" data-tip="O'tkazib chizish" data-cmd="strikeThrough">
                        <svg viewBox="0 0 24 24">
                            <line x1="5" y1="12" x2="19" y2="12" />
                            <path
                                d="M16 6c-.87-.57-2.06-1-3.5-1C9.8 5 8 6.5 8 8.5c0 .92.35 1.77 1 2.5M8 18c.87.57 2.06 1 3.5 1 2.7 0 4.5-1.5 4.5-3.5 0-.92-.35-1.77-1-2.5" />
                        </svg>
                    </button>

                    <div class="tb-sep"></div>

                    <button class="tb-btn" data-tip="Ro'yxat" data-cmd="ul">
                        <svg viewBox="0 0 24 24">
                            <line x1="9" y1="6" x2="20" y2="6" />
                            <line x1="9" y1="12" x2="20" y2="12" />
                            <line x1="9" y1="18" x2="20" y2="18" />
                            <circle cx="4" cy="6" r="1" fill="currentColor" />
                            <circle cx="4" cy="12" r="1" fill="currentColor" />
                            <circle cx="4" cy="18" r="1" fill="currentColor" />
                        </svg>
                    </button>
                    <button class="tb-btn" data-tip="Raqamli ro'yxat" data-cmd="ol">
                        <svg viewBox="0 0 24 24">
                            <line x1="10" y1="6" x2="21" y2="6" />
                            <line x1="10" y1="12" x2="21" y2="12" />
                            <line x1="10" y1="18" x2="21" y2="18" />
                            <path d="M4 6h1v4M4 10h2M6 18H4l2-2.7A1.5 1.5 0 004.5 13" />
                        </svg>
                    </button>
                    <button class="tb-btn" data-tip="Iqtibos" data-cmd="blockquote">
                        <svg viewBox="0 0 24 24">
                            <path
                                d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V20c0 1 0 1 1 1zm12 0c3 0 7-1 7-8V5c0-1.25-.757-2.017-2-2h-4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2h.75c0 2.25.25 4-2.75 4v3c0 1 0 1 1 1z" />
                        </svg>
                    </button>
                    <button class="tb-btn" id="btn-link" data-tip="Link qo'shish" data-cmd="link">
                        <svg viewBox="0 0 24 24">
                            <path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71" />
                            <path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71" />
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Editor -->
            <div class="editor" id="editor" contenteditable="true" data-placeholder="Matnni shu yerga yozing..."></div>

            <!-- Footer -->
            <div class="footer">
                <div class="wc">
                    So'z: <span id="wordCount">0</span> &nbsp;·&nbsp; Belgi: <span id="charCount">0</span>
                </div>
                <div class="save-status">
                    <div class="save-dot" id="saveDot"></div>
                    <span id="saveStatus">Saqlandi</span>
                </div>
            </div>

        </div>

        <!-- Link modal -->
        <div class="link-modal" id="linkModal">
            <div class="link-box">
                <h3>Link qo'shish</h3>
                <input type="url" id="linkUrl" placeholder="https://example.com" />
                <div class="link-box-btns">
                    <button class="lb-cancel" id="linkCancel">Bekor</button>
                    <button class="lb-confirm" id="linkConfirm">Qo'shish</button>
                </div>
            </div>
        </div>

        <script src="../js/style.js" type="module"></script>
        <script src="../js/create-post.js" type="module"></script>
</body>

</html>
