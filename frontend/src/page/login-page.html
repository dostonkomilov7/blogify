<!DOCTYPE html>
<html>
<head>
    <title>Blogify</title>
</head>
<body>
    <main>
        <div class="login">
            <h1 class="left">Hello, <br>Welcome Back</h1>
            <p class="content left">Hey, welcome back to your special place</p>
            <form>
                <input type="email" placeholder="Email" class="left"><br>
                <input type="password" placeholder="Password" class="left"><br>
                <input type="checkbox" name="remember" class="chbox left">
                <label for="remember" class="content">Remember me</label>
                <a href="/frontend/src/page/register.html" class="content left">Forgot Password ?</a><br>
                <button class="btn">Sign In</button>
                <a href="/src/page/register-page.html" class="content left">Don't have an account? <span style="color: blueviolet;">Sign Up</span></a>
            </form>
        </div>
        <div class="lg_image">
            <img src="../assets/Login.png" alt="">
        </div>
    </main>

    <script src="../JS/style.js" type="module"></script>
</body>
</html>
